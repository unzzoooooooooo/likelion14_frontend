<!DOCTYPE html>
<html lang="en">
<head><!--head 부분은 설정 영역입니다.-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프론트엔드 연습</title>
    <link rel="stylesheet" href="practice.css">
</head>
<body><!--body 부분은 본문 영역입니다. 코드를 작성하는 위치입니다.-->
    <h1>안녕하세요</h1>
    <h2>안녕하세요?</h2>
    <h3>안녕하세요!</h3>
    <p>첫 번째 문단이에요</p>
    <p>두 번째 문단이에요</p>
    <div>div는 하나의 영역이에요! 프론트엔드 개발 시에 가장 많이 쓰게 되는 태그입니다.</div>
    <hr><!--hr은 구분선을 위한 태그-->
    <span>span도 하나의 영역이지만 div태그와 달리 자동 줄바꿈이 안돼요ㅠㅠ</span>
    <span> 그래서 한줄로 보이죠!</span><br><br><!--br은 줄바꿈을 위한 태그-->
    <!--이미지를 삽입하기 위한 태그-->
    <img src="../../src/assets/images/React.png" height="200" width="220"><!--프로젝트 폴더 내의 사진 삽입-->
    <img src="https://www.petpaper.co.kr/news/photo/202308/8864_8901_5733.png" height="200" width="300"><!--인터넷 상의 사진 삽입-->
    <hr>
    <h1>프론트 운영진 목록</h1>
    <ul>
        <li>심서현</li>
        <li>정목진</li>
        <li>김현수</li>
    </ul>

    <input type="text" id="nameInput" placeholder="이름을 입력하세요">
    
    <button id="myButton">실습 실행!</button>

    <script src="practice.js"></script>
</body>
</html>
